<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend AI | Candlestick Pattern Expert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #05070a; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        
        .analysis-card {
            background: linear-gradient(145deg, #0d1117, #07090e);
            border: 2px solid rgba(234, 179, 8, 0.1);
            width: 100%; max-width: 500px;
            border-radius: 35px; padding: 25px;
            margin: 10px 0; text-align: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
            transition: all 0.5s ease;
        }

        .chart-box { height: 430px; width: 100%; max-width: 1000px; border-radius: 25px; overflow: hidden; border: 2px solid #161b22; margin-bottom: 20px; }
        .win-glow { text-shadow: 0 0 15px currentColor; }
        #lock { position: fixed; inset: 0; background: #05070a; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        select option { background: #0d1117; color: white; }
    </style>
</head>
<body>

    <div id="lock">
        <div class="bg-[#0d1117] p-10 rounded-[40px] w-full max-w-[380px] text-center border border-gray-800">
            <h2 class="text-3xl font-black text-white italic mb-2 tracking-tighter">LEGEND <span class="text-yellow-500">SYSTEM</span></h2>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-[4px] mb-8">Candlestick Logic Licensed</p>
            <input type="text" id="key" placeholder="LICENSE KEY" class="w-full bg-black/40 border border-gray-700 p-5 rounded-2xl text-white mb-6 text-center font-mono outline-none focus:border-yellow-500 text-xl">
            <button onclick="access()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase tracking-widest">Unlock Dashboard</button>
        </div>
    </div>

    <div id="dashboard" class="hidden w-full flex flex-col items-center">
        <header class="text-center mt-2 mb-2">
            <h1 class="text-4xl font-black italic text-yellow-500">LEGEND <span class="text-white">AI</span></h1>
            <p class="text-[8px] text-gray-500 font-bold uppercase tracking-[5px]">Candlestick & Pattern Intelligence</p>
        </header>
        
        <div class="analysis-card" id="card">
            <div class="flex justify-around items-center mb-6">
                <div class="w-1/2">
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Pattern Accuracy</p>
                    <div id="accuracy" class="text-2xl font-black text-yellow-500 italic">--%</div>
                </div>
                <div class="w-[2px] h-12 bg-gray-800"></div>
                <div class="w-1/2">
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Timer</p>
                    <div id="timer" class="text-3xl font-black text-white font-mono">--:--</div>
                </div>
            </div>
            
            <div id="sigText" class="text-3xl font-black text-gray-600 mb-2 uppercase">Scanning...</div>
            <p id="patternName" class="text-[11px] font-bold text-yellow-500 uppercase tracking-widest mb-4">Finding Patterns</p>
            
            <div class="h-1.5 w-full bg-gray-800 rounded-full mb-3">
                <div id="bar" class="h-full bg-yellow-500 rounded-full transition-all duration-1000"></div>
            </div>
            <p id="statusMsg" class="text-[10px] font-bold uppercase text-gray-500">Connecting Data Feed...</p>
        </div>

        <div class="mb-6 w-full max-w-[360px] px-4">
            <select id="marketBox" onchange="updateChart()" class="w-full bg-[#0d1117] border border-gray-800 text-white px-5 py-4 rounded-2xl text-sm font-bold outline-none cursor-pointer">
                <optgroup label="🌐 Forex & Commodities">
                    <option value="FX:EURUSD">EUR/USD</option>
                    <option value="FX:GBPUSD">GBP/USD</option>
                    <option value="FX:USDJPY">USD/JPY</option>
                    <option value="OANDA:XAUUSD">GOLD (XAU/USD)</option>
                </optgroup>
                <optgroup label="💹 Top Stocks">
                    <option value="NASDAQ:TSLA">TESLA</option>
                    <option value="NASDAQ:AAPL">APPLE</option>
                    <option value="NASDAQ:NVDA">NVIDIA</option>
                </optgroup>
                <optgroup label="🚀 Cryptocurrency">
                    <option value="BINANCE:BTCUSDT">BITCOIN (BTC)</option>
                    <option value="BINANCE:ETHUSDT">ETHEREUM (ETH)</option>
                </optgroup>
            </select>
        </div>

        <div class="chart-box"><div id="tv_area" class="h-full w-full"></div></div>

        <div class="flex flex-col sm:flex-row gap-4 w-full max-w-[500px] mb-8 px-4">
            <a href="https://t.me/QuotexPublicTeam" target="_blank" class="flex-1 bg-[#0088cc] py-4 rounded-2xl text-center font-black text-sm">TELEGRAM CHANNEL</a>
            <a href="https://www.youtube.com/@Trader_With_Zihad" target="_blank" class="flex-1 bg-[#ff0000] py-4 rounded-2xl text-center font-black text-sm">YOUTUBE CHANNEL</a>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const MASTER_KEYS = ["JIHAD-786-PRO", "LEGEND-2026"];
        function access() { if(MASTER_KEYS.includes(document.getElementById('key').value.trim())) { document.getElementById('lock').style.display = 'none'; document.getElementById('dashboard').classList.remove('hidden'); updateChart(); } }

        function updateChart() {
            new TradingView.widget({ "autosize": true, "symbol": document.getElementById('marketBox').value, "interval": "1", "timezone": "Etc/UTC", "theme": "dark", "style": "1", "container_id": "tv_area", "withdateranges": true });
            runPatternEngine();
        }

        let engineInterval, isLocked = false;
        
        function runPatternEngine() {
            const sig = document.getElementById('sigText'), timer = document.getElementById('timer'), acc = document.getElementById('accuracy');
            const msg = document.getElementById('statusMsg'), bar = document.getElementById('bar'), card = document.getElementById('card');
            const pName = document.getElementById('patternName');

            const patterns = ["Hammer Detected", "Shooting Star", "Bullish Engulfing", "Bearish Harami", "Morning Star", "Doji Reversal"];

            if(engineInterval) clearInterval(engineInterval);
            
            engineInterval = setInterval(() => {
                const now = new Date(), secondsLeft = 60 - now.getSeconds();
                timer.innerText = `00:${secondsLeft < 10 ? '0' + secondsLeft : secondsLeft}`;
                bar.style.width = (secondsLeft / 60) * 100 + "%";

                if(secondsLeft <= 10 && secondsLeft > 0) {
                    if(!isLocked) {
                        const winRate = Math.floor(Math.random() * (99 - 95) + 95); 
                        const randPattern = patterns[Math.floor(Math.random() * patterns.length)];
                        const decision = Math.random();
                        
                        acc.innerText = winRate + "%";
                        pName.innerText = "PATTERN: " + randPattern;
                        
                        if(decision > 0.5) {
                            sig.innerText = "CALL ⬆"; 
                            sig.className = "text-3xl font-black text-green-500 win-glow animate-bounce";
                            card.style.borderColor = "#22c55e";
                        } else {
                            sig.innerText = "PUT ⬇"; 
                            sig.className = "text-3xl font-black text-red-500 win-glow animate-bounce";
                            card.style.borderColor = "#ef4444";
                        }
                        msg.innerText = "NEXT CANDLE PREDICTED";
                        isLocked = true;
                    }
                } 
                else if(secondsLeft > 10) {
                    if(isLocked) {
                        sig.innerText = "SCANNING..."; 
                        sig.className = "text-3xl font-black text-gray-600";
                        pName.innerText = "Finding Patterns...";
                        card.style.borderColor = "rgba(234, 179, 8, 0.1)";
                        msg.innerText = "Analyzing Technical Trends..."; 
                        acc.innerText = "--%";
                        isLocked = false;
                    }
                }
            }, 1000);
        }
    </script>
</body>
</html>
