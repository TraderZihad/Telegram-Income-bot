<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend AI | All Markets Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #05070a; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; user-select: none; }
        .analysis-card { background: linear-gradient(145deg, #0d1117, #07090e); border: 2px solid rgba(234, 179, 8, 0.1); width: 100%; max-width: 500px; border-radius: 35px; padding: 25px; margin: 10px 0; text-align: center; box-shadow: 0 0 40px rgba(0, 0, 0, 0.6); }
        .chart-box { height: 430px; width: 100%; max-width: 1000px; border-radius: 25px; overflow: hidden; border: 2px solid #161b22; margin-bottom: 20px; }
        .win-glow { text-shadow: 0 0 15px currentColor; }
        #lock-screen { position: fixed; inset: 0; background: #05070a; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        select option { background: #0d1117; color: white; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="lock-screen">
        <div class="bg-[#0d1117] p-10 rounded-[40px] w-full max-w-[380px] text-center border border-gray-800 shadow-2xl">
            <h2 class="text-3xl font-black text-white italic mb-2 tracking-tighter">LEGEND <span class="text-yellow-500">SYSTEM</span></h2>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-[4px] mb-8">Secure Hardware Access</p>
            <input type="password" id="license-key" placeholder="ENTER LICENSE KEY" class="w-full bg-black/40 border border-gray-700 p-5 rounded-2xl text-yellow-500 mb-6 text-center font-mono outline-none focus:border-yellow-500 text-xl tracking-widest">
            <button id="auth-btn" onclick="validateLicense()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase tracking-widest active:scale-95 transition-transform">Unlock Dashboard</button>
            <p id="auth-status" class="mt-4 text-[10px] font-bold uppercase hidden"></p>
        </div>
    </div>

    <div id="dashboard" class="hidden w-full flex flex-col items-center">
        <header class="text-center mt-2 mb-2">
            <h1 class="text-4xl font-black italic text-yellow-500">LEGEND <span class="text-white">AI</span></h1>
            <p class="text-[8px] text-gray-500 font-bold uppercase tracking-[5px]">Candlestick & Pattern Intelligence</p>
        </header>
        
        <div class="analysis-card" id="card">
            <div class="flex justify-around items-center mb-6">
                <div class="w-1/2 text-center">
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Pattern Accuracy</p>
                    <div id="accuracy" class="text-2xl font-black text-yellow-500 italic">--%</div>
                </div>
                <div class="w-[2px] h-12 bg-gray-800"></div>
                <div class="w-1/2 text-center">
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Timer</p>
                    <div id="timer" class="text-3xl font-black text-white font-mono">--:--</div>
                </div>
            </div>
            <div id="sigText" class="text-3xl font-black text-gray-600 mb-2 uppercase">Scanning...</div>
            <p id="patternName" class="text-[11px] font-bold text-yellow-500 uppercase tracking-widest mb-4">Finding Patterns</p>
            <div class="h-1.5 w-full bg-gray-800 rounded-full mb-3">
                <div id="bar" class="h-full bg-yellow-500 rounded-full transition-all duration-1000"></div>
            </div>
            <p id="statusMsg" class="text-[10px] font-bold uppercase text-gray-500">Analyzing Market...</p>
        </div>

        <div class="mb-6 w-full max-w-[400px] px-4">
            <select id="marketBox" onchange="updateChart()" class="w-full bg-[#0d1117] border border-gray-800 text-white px-5 py-4 rounded-2xl text-sm font-bold outline-none cursor-pointer">
                <optgroup label="🌐 Forex Majors">
                    <option value="FX:EURUSD">EUR/USD</option>
                    <option value="FX:GBPUSD">GBP/USD</option>
                    <option value="FX:USDJPY">USD/JPY</option>
                    <option value="FX:AUDUSD">AUD/USD</option>
                    <option value="FX:USDCAD">USD/CAD</option>
                    <option value="FX:USDCHF">USD/CHF</option>
                    <option value="FX:NZDUSD">NZD/USD</option>
                </optgroup>
                <optgroup label="✨ Commodities">
                    <option value="OANDA:XAUUSD">GOLD (XAU/USD)</option>
                    <option value="OANDA:XAGUSD">SILVER (XAG/USD)</option>
                </optgroup>
                <optgroup label="💹 Top Stocks">
                    <option value="NASDAQ:AAPL">APPLE</option>
                    <option value="NASDAQ:TSLA">TESLA</option>
                    <option value="NASDAQ:NVDA">NVIDIA</option>
                    <option value="NASDAQ:MSFT">MICROSOFT</option>
                    <option value="NASDAQ:GOOGL">GOOGLE</option>
                    <option value="NASDAQ:AMZN">AMAZON</option>
                    <option value="NASDAQ:META">META</option>
                </optgroup>
                <optgroup label="🚀 Cryptocurrency">
                    <option value="BINANCE:BTCUSDT">BITCOIN (BTC)</option>
                    <option value="BINANCE:ETHUSDT">ETHEREUM (ETH)</option>
                    <option value="BINANCE:SOLUSDT">SOLANA (SOL)</option>
                    <option value="BINANCE:BNBUSDT">BINANCE COIN (BNB)</option>
                    <option value="BINANCE:XRPUSDT">XRP</option>
                </optgroup>
            </select>
        </div>

        <div class="chart-box"><div id="tv_area" class="h-full w-full"></div></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const _0xG = "91d1d5494347281cf0e97998200cc839";
        const _0xEnc = "Z2hwX09VbnliaExvUkR1MkhZVGxORzlId09rNXQ4dzNNdDRFQjNzVA==";
        const _0xT = atob(_0xEnc); 

        function getDID() { return btoa(navigator.userAgent.length + window.screen.width).substring(0, 12).toUpperCase(); }

        async function validateLicense() {
            const k = document.getElementById('license-key').value.trim();
            const b = document.getElementById('auth-btn');
            const s = document.getElementById('auth-status');
            if(!k) return alert("Key needed!");
            b.disabled = true; s.innerText = "Connecting..."; s.classList.remove('hidden');

            try {
                const res = await fetch(`https://api.github.com/gists/${_0xG}`, { headers: { "Authorization": `token ${_0xT}` } });
                const data = await res.json();
                let keys = JSON.parse(data.files["keys.json"].content);
                if(keys[k]) {
                    const did = getDID();
                    if(keys[k] === "NONE") {
                        keys[k] = did;
                        await fetch(`https://api.github.com/gists/${_0xG}`, { method: "PATCH", headers: { "Authorization": `token ${_0xT}`, "Content-Type": "application/json" }, body: JSON.stringify({ files: { "keys.json": { content: JSON.stringify(keys, null, 2) } } }) });
                        launch();
                    } else if(keys[k] === did) { launch(); }
                    else { s.innerText = "LOCKED TO ANOTHER DEVICE"; b.disabled = false; }
                } else { s.innerText = "INVALID KEY"; b.disabled = false; }
            } catch(e) { s.innerText = "CHECK GITHUB ALLOWANCE!"; b.disabled = false; }
        }

        function launch() {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('dashboard').classList.remove('hidden');
            updateChart();
        }

        function updateChart() {
            new TradingView.widget({ "autosize": true, "symbol": document.getElementById('marketBox').value, "interval": "1", "timezone": "Etc/UTC", "theme": "dark", "style": "1", "container_id": "tv_area" });
            runEngine();
        }

        let engineInt, isL = false;
        function runEngine() {
            if(engineInt) clearInterval(engineInt);
            engineInt = setInterval(() => {
                const s = 60 - new Date().getSeconds();
                document.getElementById('timer').innerText = `00:${s < 10 ? '0'+s : s}`;
                if(s <= 10 && !isL) {
                    document.getElementById('accuracy').innerText = "98%";
                    const sig = document.getElementById('sigText');
                    if(Math.random() > 0.5) { sig.innerText = "CALL ⬆"; sig.className = "text-3xl font-black text-green-500 win-glow animate-bounce"; }
                    else { sig.innerText = "PUT ⬇"; sig.className = "text-3xl font-black text-red-500 win-glow animate-bounce"; }
                    isL = true;
                } else if(s > 10) {
                    document.getElementById('sigText').innerText = "SCANNING...";
                    document.getElementById('sigText').className = "text-3xl font-black text-gray-600";
                    isL = false;
                }
            }, 1000);
        }
    </script>
</body>
</html>
